name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-build:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npm run db:generate --workspace=@rent-a-car/api

      - name: Run ESLint (web)
        run: npm run lint --workspace=@rent-a-car/web

      - name: Run ESLint (api)
        run: npm run lint --workspace=@rent-a-car/api

      - name: Build shared package
        run: npm run build --workspace=@rent-a-car/shared

      - name: TypeScript build (api)
        run: npm run build --workspace=@rent-a-car/api

      - name: TypeScript build (web)
        run: npm run build --workspace=@rent-a-car/web
        env:
          NEXTAUTH_SECRET: ci-placeholder
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

  test-api:
    name: API Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npm run db:generate --workspace=@rent-a-car/api

      - name: Run API tests
        run: npm run test --workspace=@rent-a-car/api
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret
